<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anemos Energy Trading LLC</title>
  <meta name="description" content="Anemos Energy Trading LLC — Systematic quantitative trading in wholesale electricity markets." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0a1628;
      --deep:   #0d1f3c;
      --accent: #00c2e0;
      --light:  #e8edf4;
      --muted:  #8a9bb5;
      --white:  #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--navy);
      color: var(--light);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ──────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 5%;
      background: rgba(10, 22, 40, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,194,224,0.12);
    }

    .nav-logo {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--white);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    nav a.nav-contact {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a.nav-contact:hover { color: var(--accent); }

    /* ── HERO ─────────────────────────────── */
    #hero {
      position: relative;
      flex: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image:
        url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=1800&auto=format&fit=crop&q=80');
      background-size: cover;
      background-position: center 40%;
      filter: brightness(0.35) saturate(0.8);
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,194,224,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,194,224,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPan 40s linear infinite;
    }
    @keyframes gridPan {
      0%   { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    .hero-veil {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(10,22,40,0.7) 0%,
        rgba(0,194,224,0.06) 60%,
        rgba(10,22,40,0.85) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 780px;
      padding: 0 5%;
      margin-top: 80px;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      border-left: 2px solid var(--accent);
      padding-left: 0.75rem;
    }

    h1 {
      font-size: clamp(2.4rem, 5.5vw, 4.2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 1.5rem;
    }
    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-desc {
      font-size: 1.1rem;
      color: rgba(232,237,244,0.75);
      max-width: 600px;
      margin-bottom: 2.5rem;
    }

    .contact-email {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.05rem;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(0,194,224,0.3);
      padding-bottom: 3px;
      transition: border-color 0.2s;
    }
    .contact-email:hover { border-color: var(--accent); }

    /* ── FOOTER ───────────────────────────── */
    footer {
      position: relative;
      z-index: 2;
      background: rgba(0,0,0,0.3);
      padding: 1.25rem 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.78rem;
      color: var(--muted);
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="#">ANEMOS<span>.</span></a>
    <a class="nav-contact" href="mailto:info@anemostrading.com">Contact</a>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    <div class="hero-veil"></div>
    <div class="hero-content">
      <span class="hero-eyebrow">Anemos Energy Trading LLC</span>
      <h1>Quantitative Trading in<br /><em>Electricity Markets</em></h1>
      <p class="hero-desc">
        A systematic trading firm operating in wholesale power markets.
      </p>
      <a class="contact-email" href="mailto:info@anemostrading.com">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        info@anemostrading.com
      </a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <span>&copy; 2025 Anemos Energy Trading LLC. All rights reserved.</span>
    <span>anemostrading.com</span>
  </footer>

</body>
</html>
